<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zepto-10 mins delivery</title>
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="./resources/zepto-logo-app-icon.webp" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
  <!--! NAV BAR -->
  <nav>
    <section id="nav1">
      <aside id="logo-address">
        <div id="logo">
          Z
        </div>
        <div id="address">
          <p>Delivery in <span>10 mins</span></p>
          <p id="location"><i class="fa-solid fa-location-dot"></i> Select Address</p>
        </div>
      </aside>
      <aside id="links">
        <a href="#" style="color: gold;">Home</a>
        <a href="./Products.html">Products</a>
      </aside>
      <aside id="user-cart">
        <i class="fa-regular fa-user"></i>
        <i class="fa-solid fa-cart-shopping"></i>
      </aside>
    </section>
  </nav>

  <!--! HEADER  -->
  <header>
    <div id="banner-container">
      <img src="./resources/hero-background-1.png" alt="banner1">
      <img src="./resources/hero-background-2.png" alt="banner2">
      <img src="./resources/hero-background-1.png" alt="banner3">
    </div>
  </header>

  <!--! CATRGORY -->
  <section id="category">
    <article id="category-title">
      <h3>Shop By Category</h3>
    </article>
    <article id="category-items">
    </article>
  </section>
  <script src="./script.js"></script>

  <!--! HIGHLIGHTS -->
  <section id="highlights">
    <div class="highlight-containers one">
      <p class="highlight-logo">🚴</p>
      <p class="highlight-title">Free Delivery</p>
      <p class="highlight-description">On orders above ₹149/-</p>
    </div>

    <div class="highlight-containers two">
      <p class="highlight-logo">⚡</p>
      <p class="highlight-title">10 mins delivery</p>
      <p class="highlight-description">Lightning fast </p>
    </div>

    <div class="highlight-containers three">
      <p class="highlight-logo">💸</p>
      <p class="highlight-title">Best prices</p>
      <p class="highlight-description">Direct from farms</p>
    </div>

    <div class="highlight-containers four">
      <p class="highlight-logo">🛍️</p>
      <p class="highlight-title">Wide assortment</p>
      <p class="highlight-description">10000+ products</p>
    </div>
  </section>

  <!--! FOOTER -->
  <footer>
    <h2>Zepto</h2>
    <p>&copy; 2026 | 10 Minutes Delivery</p>
    <p>194 products across 24 categories.</p>
  </footer>
  <script src="./script.js"></script>
</body>

</html>
